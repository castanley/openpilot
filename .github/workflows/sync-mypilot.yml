# Keeps the MyPilot fork branches current with upstream SunnyPilot.
#
# Each run rebuilds every mypilot-* branch as: latest upstream release branch + the MyPilot agent
# overlay (sunnypilot/mypilot, sourced canonically from mypilot-mici) + the registered mypilotd
# process. It pushes only when the result actually differs (no needless churn / on-device rebuilds).
#
# This file lives on the fork's DEFAULT branch (master) so the schedule fires. Canonical copy is
# tracked in the MyPilot repo at deploy/fork/sync-mypilot.yml.
name: sync-mypilot

on:
  schedule:
    - cron: "17 8 * * *"   # daily ~08:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-mypilot
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mypilot: mypilot-mici
            upstream: release-mici
          - mypilot: mypilot-mici-staging
            upstream: release-mici-staging
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git + remotes
        run: |
          git config user.name "mypilot-sync[bot]"
          git config user.email "mypilot-sync@users.noreply.github.com"
          git remote add upstream https://github.com/sunnypilot/sunnypilot.git

      - name: Fetch upstream + fork branches
        run: |
          git fetch --depth 1 upstream "${{ matrix.upstream }}"
          git fetch --depth 1 origin mypilot-mici "${{ matrix.mypilot }}" || git fetch --depth 1 origin mypilot-mici

      - name: Rebuild branch = upstream + MyPilot agent
        env:
          MYPILOT: ${{ matrix.mypilot }}
          UPSTREAM: ${{ matrix.upstream }}
        run: |
          set -euo pipefail
          git checkout -B sync-tmp "upstream/${UPSTREAM}"
          # Bring the agent overlay from the canonical branch (single source of truth).
          git checkout origin/mypilot-mici -- sunnypilot/mypilot
          python3 sunnypilot/mypilot/install_process.py
          git add -A
          git commit -m "sync: ${MYPILOT} = ${UPSTREAM}@$(git rev-parse --short upstream/${UPSTREAM}) + MyPilot agent" || {
            echo "Nothing to commit"; exit 0; }
          if git rev-parse --verify "origin/${MYPILOT}" >/dev/null 2>&1 && git diff --quiet sync-tmp "origin/${MYPILOT}"; then
            echo "No change for ${MYPILOT}; skipping push."
          else
            git push --force origin "sync-tmp:${MYPILOT}"
            echo "Pushed refreshed ${MYPILOT}."
          fi
